  "implementation_constraints": {
    "synthesis": {
      "infer_dsp": "avoid",
      "infer_bram": "avoid",
      "flatten_hierarchy": "rebuilt",
      "prefer_shift_register_inference": true
    },
    "implementation": {
      "strategy": "default"
    },
    "coding_rules": [
      "spi_slave_core shall be fully synthesizable",
      "spi_slave_bfm shall be simulation-only and shall not be part of the synthesizable RTL deliverable",
      "No simulation-only task logic, queue logic, delay constructs, logging logic, or self-checking logic shall appear inside spi_slave_core",
      "Use always_ff for sequential logic",
      "Use always_comb for combinational logic",
      "Do not infer latches",
      "Do not use #delay in synthesizable code",
      "Separate synthesizable logic from simulation-only BFM features",
      "Keep protocol edge interpretation explicit and do not mix rising-edge sample semantics with falling-edge update semantics",
      "Do not change transmit data source in the middle of an active frame",
      "Represent inactive MISO behavior through miso_oe control rather than by overloading data semantics"
    ],
    "ip_policy": {
      "allow_vendor_ip": false,
      "allow_generated_ip": false
    },
    "cdc_policy": {
      "allowed_clock_domains": 2,
      "async_crossings_allowed": true,
      "note": "The synthesizable SPI protocol engine shall operate in the sclk domain. CDC requirements are normative at the contract level: transmit frame-start selection shall use only a coherent sclk-domain shadow copy of preload data, and reported receive completions shall correspond to coherent bytes in the clk domain. One compliant implementation for each crossing is a toggle-based mailbox, but equivalent implementations are permitted if they satisfy the same observable contract."
    },
    "reset_policy": {
      "default_reset_style": "async_assert_sync_deassert_active_low",
      "reset_expectations": [
        "Reset shall clear frame-progress state, bit counter state, partial RX/TX shift state, and rx_valid pulse state.",
        "Reset shall leave the core in an idle, non-frame-active condition.",
        "Reset shall discard any in-progress frame and suppress any completion derived from partial pre-reset state.",
        "Reset deassertion shall be synchronized independently into the clk and sclk domains.",
        "Reset shall not permit unknown-valued synthesizable outputs after reset release; rx_data shall reset to 8'h00 and miso_o shall reset to 1'b0."
      ]
    }
  },
