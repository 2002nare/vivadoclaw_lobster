    "clocking": {
      "domains": [
        {
          "name": "clk",
          "frequency_mhz": null,
          "source": "external",
          "role": "Internal system clock for byte-side control/status interfacing and non-SPI integration logic."
        },
        {
          "name": "sclk",
          "frequency_mhz": null,
          "source": "spi_input",
          "role": "External SPI clock domain used for protocol-engine shift, bit-count, and frame-boundary behavior."
        }
      ],
      "notes": [
        "spi_slave_core shall treat sclk as a dedicated sequential clock for protocol-engine registers in the sclk domain; no oversampling implementation is required by this spec.",
        "cs_n and mosi are asynchronous relative to clk but synchronous to the external SPI transfer and shall meet setup/hold requirements to sclk at the package pins for correct protocol capture.",
        "For the synthesizable core, frame-start recognition shall occur only on the first rising edge of sclk observed after cs_n was previously observed high. The core does not measure an absolute tCSS interval internally. Correct operation instead depends on the external interface requirement that cs_n be low and stable before that first counted rising edge. A frame shall be considered active only upon that first counted rising edge when legal-start conditions are satisfied. The interval after cs_n falls and before that first counted rising edge is a pending-start condition, not an active frame. If legal-start conditions are violated in a digitally observable manner away from the setup/hold exclusion window, the attempt is illegal and shall be ignored until cs_n returns high: frame_active shall remain 0, frame_complete shall remain 0, bit_count shall remain 0, and all sclk edges shall be ignored. If cs_n rises before the 8th qualified rising edge, the frame is aborted. Abort shall suppress completion and rx_valid for that partial frame. cs_n rising may deassert miso_oe immediately by combinational gating at the output boundary, but frame state transitions and frame-completion qualification shall be generated only in the sclk domain. If cs_n changes within the setup/hold exclusion window of a relevant sclk edge at the package boundary, behavior is unspecified unless integration timing constraints guarantee legality. A qualified rising sclk edge is any subsequent low-to-high transition of sclk while frame_active is 1, frame_complete is 0, and cs_n remains low.",
        "A qualified falling sclk edge is any subsequent high-to-low transition of sclk while frame_active is 1, frame_complete is 0, and cs_n remains low.",
        "Any sclk edge occurring when these conditions are not met shall be ignored by the synthesizable protocol engine.",
        "The synthesizable SPI protocol engine shall operate in the sclk domain for shift, bit-count, and frame-boundary detection.",
        "clk and sclk shall be treated as distinct clock domains for implementation and verification purposes.",
        "Transfers between the sclk-domain protocol engine and the clk-domain byte/control interface shall use explicit clock-domain-crossing logic.",
        "T_CSS_MIN is an external interface requirement. The integrating system or testbench stimulus is responsible for satisfying it for legal-frame tests. spi_slave_core does not internally measure analog time; therefore T_CSS_MIN shall not be treated as an internally checked timer unless a future revision adds an explicit digital timebase and rule."
      ]
    },
    "reset": {
      "signals": [
        {
          "name": "rst_n",
          "active_level": "low",
          "synchronous": false,
          "affects": [
            "clk-domain state after domain-local reset synchronization",
            "sclk-domain state after domain-local reset synchronization",
            "shift register state",
            "bit counter",
            "frame-active state",
            "valid pulse generation"
          ]
        }
      ],
      "notes": [
        "The design contains distinct clk and sclk domains; reset deassertion shall be synchronized independently into each domain.",
        "rst_n is active low and may assert asynchronously to both clk and sclk. Asynchronous assertion of rst_n shall dominate all protocol activity.",
        "While rst_n is asserted, frame_active=0, frame_complete=0, bit_count=0, rx_valid=0, miso_oe=0, rx_data=8'h00, and miso_o=1'b0. Any sclk or cs_n activity during reset shall be ignored. Reset deassertion shall be synchronized independently into clk and sclk, and after synchronized release each domain shall resume from the idle state only. No completion event or rx_valid pulse may be generated from any partial pre-reset frame."
      ]
