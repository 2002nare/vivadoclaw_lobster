        "name": "tx_byte_if",
        "kind": "preload_source",
        "role": "input",
        "description": "Clk-domain transmit-byte preload source. tx_data and tx_valid are owned by the clk-domain byte/control interface. Normative contract: frame-start selection in the sclk domain shall use only a coherently captured shadow copy of the preload, and no legal frame-start selection may observe a mixed byte or a tx_valid state that does not correspond to the captured byte. The source-side preload value shall remain unchanged from publication until the chosen CDC protocol guarantees that the sclk-domain shadow copy has been updated coherently. One compliant protocol is a toggle-based request/acknowledge mailbox: clk-domain logic loads a dedicated source holding register, asserts tx_valid, toggles a request bit, holds the source holding register unchanged until a synchronized acknowledge toggle returns, and the sclk domain updates tx_shadow_data and tx_shadow_valid exactly once per observed request toggle.",
        "signals": [
