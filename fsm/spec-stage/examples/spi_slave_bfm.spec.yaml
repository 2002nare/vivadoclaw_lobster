  "functional_spec": {
    "behavior": "The design shall implement an SPI slave operating in Mode 0 with a fixed frame width of 8 bits.\nThe slave shall participate in transfers only while cs_n is asserted low.\nA frame shall be considered active only upon the first qualified rising edge of sclk after cs_n has transitioned from high to low and all legal-start conditions are satisfied. The interval after cs_n falls and before that first qualified rising edge is a pending-start condition, not an active frame.\nA frame ends either when the 8th qualified rising edge of sclk is accepted or when cs_n is deasserted before that 8th qualified rising edge. If cs_n rises before the 8th qualified rising edge, the frame is aborted. Abort shall suppress any frame completion and any rx_valid generation from that partial frame. cs_n may deassert miso_oe immediately at the output boundary, but frame state transitions and completion suppression shall be generated in the sclk domain only.\nTransfers shall be MSB-first. For each frame, the first sampled MOSI bit shall map to rx_data[7], and the eighth sampled MOSI bit shall map to rx_data[0].\nDuring an active frame, the slave shall sample MOSI only on qualified rising edges of sclk and shall update MISO only on qualified falling edges of sclk.\nAt legal frame start, miso_o shall be set to the selected transmit byte bit[7] before the first qualified rising edge. After legal frame start and until frame end or reset, subsequent transmit-bit transitions on miso_o shall occur only on qualified falling edges of sclk. When miso_oe=0, miso_o may retain its last registered value but has no electrical effect at the external pin.\nThe receive path shall assemble exactly 8 sampled MOSI bits into one receive byte.\nThe transmit path shall shift one selected transmit byte across the same frame.\ntx_data and tx_valid shall belong to the clk-domain byte/control interface and shall not be sampled directly by sclk-domain protocol logic.\nTransmit preload transfer shall satisfy the following normative CDC contract: the sclk-domain frame-start logic shall use only a coherently captured shadow copy of the transmit preload; no legal frame-start selection may observe a mixed byte or a tx_valid state that does not correspond to the captured byte; and the source-side preload value shall remain unchanged until the selected CDC protocol guarantees coherent shadow update. One compliant protocol is a toggle-based request/acknowledge mailbox in which clk-domain logic publishes a source holding register, toggles a request bit, and holds that source holding register unchanged until a synchronized acknowledge toggle returns from the sclk domain.\nThe core shall maintain an sclk-domain tx_shadow_data[7:0] and tx_shadow_valid updated only by an explicit coherent CDC mechanism. At legal frame start, the transmit byte shall be selected exactly once: if tx_shadow_valid=1 at that event, tx_shift_reg shall load tx_shadow_data; otherwise tx_shift_reg shall load DEFAULT_TX_BYTE. tx_shift_reg shall not change again until the frame ends.\nChanges to clk-domain tx_data or tx_valid after frame-start selection shall not affect the current in-flight frame.\nA legal frame shall begin only when the first counted rising edge of sclk occurs after cs_n was previously observed high and the external interface timing assumptions for legal start are satisfied. T_CSS_MIN is an external interface requirement, not an internally measured timer in spi_slave_core. For guaranteed legal-frame operation, the integrating system shall ensure that cs_n is low and stable before the first counted rising edge of sclk and remains low through that edge. Under that condition, the selected transmit byte shall be chosen once at frame start, miso_o shall already present bit 7 of that byte before the first counted rising edge, and miso_oe shall already be asserted for that counted edge. If legal-start conditions are violated in a digitally observable manner away from the setup/hold exclusion window, the attempted frame shall be ignored until cs_n returns high. If setup/hold is violated at the package boundary, behavior is unspecified and excluded from pass/fail functional checking.\nThe 8th qualified rising edge shall be counted, shall sample the final MOSI bit into rx_data[0], and shall complete the frame. Immediately after recognition of that edge, frame_complete shall become 1 in the sclk domain. No subsequent rising or falling sclk edge while cs_n remains low shall be qualified, and no additional receive byte, rx_valid pulse, MISO shift, or new frame start shall occur until cs_n first returns high and then falls low again.\nA new frame shall not begin until cs_n has first returned high and is then asserted low again.\nReceive completion transfer shall satisfy the following normative CDC contract: each reported clk-domain completion shall correspond to one coherent received byte; rx_data shall remain stable for the full clk cycle in which rx_valid=1; and if multiple sclk-domain completions are collapsed before clk-domain observation, only the most recent completed byte is required to be preserved. One compliant protocol is a toggle-based event mailbox in which the sclk domain updates rx_hold_sclk with the completed byte, toggles rx_event_tgl_sclk once, and leaves rx_hold_sclk unchanged until the next completion or reset. The clk domain synchronizes rx_event_tgl_sclk through a two-flop synchronizer, detects a change at cycle N, captures the associated receive byte into rx_data at cycle N, and asserts rx_valid for exactly cycle N+1. If one or more additional frame completions occur before the clk domain detects a pending receive event, the implementation is required to preserve only the most recent completed byte in rx_hold_sclk; the clk domain is required to generate at most one rx_valid pulse for that collapsed set of completions.\nIf cs_n deasserts before the 8th sampled bit, the frame is aborted and no receive-valid pulse shall be generated for that partial frame.\nWhen cs_n is inactive, the core shall express inactive MISO behavior through the defined output-enable policy rather than actively driving a valid data bit.\nThe synthesizable SPI protocol engine shall operate in the sclk domain for shift, bit-count, and frame-boundary behavior, and any interaction with a separate clk-domain byte/control interface shall use explicit CDC logic.\nThe simulation-only BFM layer may extend the design with task APIs, queued or memory-backed transmit responses, logging, protocol anomaly injection, and self-checking hooks, but those additions shall not change nominal common protocol semantics.\n",
    "state_machines": [
      {
        "name": "frame_control",
        "description": "Tracks idle, active, complete, and aborted frame conditions based on cs_n and qualified bit progression."
      },
      {
        "name": "tx_load_control",
        "description": "Selects the frame transmit byte from tx_data or DEFAULT_TX_BYTE at frame start."
      },
      {
        "name": "bfm_extension_control",
        "description": "Coordinates simulation-only response source selection, protocol anomaly injection, and expectation tracking when BFM extensions are enabled."
      }
    ],
    "transaction_rules": [
      "A frame becomes active only on the first counted rising edge of sclk after cs_n was previously observed high and all legal-start conditions are satisfied.",
      "Exactly 8 qualified rising-edge MOSI sample events define one complete nominal frame.",
      "Transfers are MSB-first: the first sampled MOSI bit of a frame maps to rx_data[7], and the eighth sampled MOSI bit maps to rx_data[0].",
      "The transmit byte for a frame shall be selected exactly once at frame start and shall remain the source for that frame's shifted MISO bits.",
      "At legal frame start, the selected transmit byte shall be taken only from a coherently captured sclk-domain shadow copy when tx_shadow_valid=1; otherwise it shall be DEFAULT_TX_BYTE. Direct sampling of clk-domain tx_data or tx_valid at frame start is forbidden.",
      "Changes to tx_data or tx_valid after frame-start selection shall not affect the current in-flight frame.",
      "At legal frame start, the selected transmit byte shall be loaded so that bit[7] is already present on miso_o and miso_oe is asserted before the first counted rising sclk edge, provided the external timing assumptions for legal start are satisfied.",
      "MISO updates shall occur only on qualified falling sclk edges while cs_n is low.",
      "MOSI samples shall occur only on qualified rising sclk edges while cs_n is low.",
      "After normal 8-bit frame completion, additional qualified sclk activity while cs_n remains low shall be ignored, and a new frame shall not begin until cs_n returns high and is then asserted low again.",
      "For each completed frame whose receive event is observed in the clk domain, rx_valid shall assert for exactly one clk cycle on the immediately following rising edge of clk.",
      "A received byte may influence transmit data only for a subsequent frame, not retroactively for the current in-flight frame.",
      "The synthesizable receive interface is non-backpressured and intentionally lossy. If multiple completions collapse before clk-domain observation, the implementation shall preserve only the most recent completed byte, may emit at most one rx_valid pulse for that collapsed set, and shall provide stable rx_data for the full clk cycle in which rx_valid=1."
    ],
    "corner_cases": [
      "cs_n deasserted in the middle of a frame before 8 sampled bits are collected.",
      "Extra sclk activity while cs_n remains low beyond the nominal 8-bit frame boundary; the synthesizable layer shall ignore such activity until cs_n returns high.",
      "No tx_valid present at the frame-start selection event, requiring DEFAULT_TX_BYTE fallback.",
      "Back-to-back frames with minimal cs_n idle spacing.",
      "tx_data or tx_valid changing after frame-start selection, which shall not affect the current in-flight frame.",
      "Reset asserted while a frame is in progress.",
      "Protocol anomaly injection in BFM mode for short frames, extra clocks, or forced mid-frame chip-select release."
    ],
    "error_handling": [
      "Partial frames aborted by cs_n deassertion shall not produce rx_valid and shall not be reported as complete receive bytes.",
      "Missing transmit preload in the synthesizable layer shall not stall operation; DEFAULT_TX_BYTE shall be shifted instead.",
      "Additional sclk activity after normal 8-bit frame completion while cs_n remains low shall be ignored by the synthesizable layer and shall not create a second completion event.",
      "Unexpected or non-nominal protocol sequences introduced in BFM mode may be logged and checked by self-checking hooks without redefining the nominal slave contract."
    ]
  },
