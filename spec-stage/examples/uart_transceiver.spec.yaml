# ──────────────────────────────────────────────────────────────────────────────
# Glossary
# ──────────────────────────────────────────────────────────────────────────────

glossary:
  - term: baud
    meaning: "Symbol rate — one bit per baud period in UART"
  - term: start_bit
    meaning: "Logic 0 for one baud period, signals beginning of a frame"
  - term: stop_bit
    meaning: "Logic 1 for one or two baud periods, signals end of a frame"
  - term: framing_error
    meaning: "Stop bit position reads 0 instead of expected 1"
  - term: overrun
    meaning: "New data received before consumer read previous data"
  - term: mid_bit_sampling
    meaning: "Sampling the serial line at the center of a bit period for noise immunity"
  - term: CLKS_PER_BIT
    meaning: "Number of system clock cycles per one baud period = CLK_FREQ_HZ / BAUD_RATE"
  - term: 2FF_synchronizer
    meaning: "Two cascaded flip-flops to safely cross from async domain to sync domain"


